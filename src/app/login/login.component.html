<div class="login-page">
    <div class="login-logo">
        <img src="./indigo-logo.svg" alt="Indigo Logo">

    </div>
    <div class="login-form" (submit)="attemptLogin()">
        <h1>Login</h1>
        <form>
            <label>Email</label>
            <input type="email">

            <label>Password</label>
            <input type="password">

            <button type="submit">Sign In</button>
        </form>
    </div>
</div>
