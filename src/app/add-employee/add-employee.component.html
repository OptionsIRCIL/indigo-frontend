<h2 mat-dialog-title>Add Employee Effort</h2>

<div mat-dialog-content class="dialog-content">
	<mat-form-field appearance="outline" floatLabel="always">
		<mat-label>Date</mat-label>
		<input
			matInput
			[matDatepicker]="picker"
			[matDatepickerFilter]="myFilter"
			[(ngModel)]="newDate"
			name="date"
		/>
		<mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
		<mat-datepicker #picker></mat-datepicker>
	</mat-form-field>

	<mat-form-field appearance="outline" floatLabel="always">
		<mat-label>Employee Name</mat-label>
		<mat-select [(ngModel)]="newEmployee" name="employee">
			@for (e of employees; track e) {
				<mat-option [value]="e">
					{{ e }}
				</mat-option>
			}
		</mat-select>
	</mat-form-field>

	<mat-form-field appearance="outline" floatLabel="always">
		<mat-label>Grant</mat-label>
		<mat-select [(ngModel)]="newGrant" name="grant">
			@for (g of grants; track g) {
				<mat-option [value]="g">
					{{ g }}
				</mat-option>
			}
		</mat-select>
	</mat-form-field>

	<mat-form-field appearance="outline" floatLabel="always">
		<mat-label>Service Type</mat-label>
		<mat-select [(ngModel)]="newType" name="type">
			@for (t of types; track t) {
				<mat-option [value]="t">
					{{ t }}
				</mat-option>
			}
		</mat-select>
	</mat-form-field>

	<mat-form-field appearance="outline" floatLabel="always">
		<mat-label>Hours</mat-label>
		<input
			matInput
			type="number"
			step="0.25"
			min="0"
			[(ngModel)]="newHours"
			name="hours"
		/>
	</mat-form-field>
</div>

<div mat-dialog-actions align="end">
	<button mat-button (click)="close()">Cancel</button>
	<button
		mat-button
		[disabled]="!newEmployee || !newGrant || !newType || newHours < 0"
		(click)="addEmployee()"
	>
		{{ data ? "Save" : "Add" }}
	</button>
</div>
