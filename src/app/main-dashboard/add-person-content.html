<mat-dialog-content>
    <mat-card class="dialog-card">
        <div align="end">
            <button class = "closebtn" matIconButton mat-dialog-close aria-label="Close dialog" align="end">
                <mat-icon>close</mat-icon><span class="spacer"></span>
            </button>
        </div>
        <mat-card-header>
            <mat-card-title>Add Person</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p>Choose a person type: </p>
            <div>
                <button mat-button>Individual</button>
                <button mat-button>Organization</button>
            </div>
            <div><br></div>
        <mat-dialog-actions align="end">
            <button mat-raised-button color="primary">Confirm</button>
        </mat-dialog-actions>
        </mat-card-content> 
    </mat-card>
    <br>
</mat-dialog-content>
