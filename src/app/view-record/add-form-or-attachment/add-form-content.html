<mat-dialog-content>
    <mat-card class="dialog-card">
        <div align="end">
            <button class = "closebtn" matIconButton mat-dialog-close aria-label="Close dialog" align="end">
                <mat-icon>close</mat-icon><span class="spacer"></span>
            </button>
        </div>
        <mat-card-header>
            <mat-card-title>Add Form</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <br><br>
            <p>Choose a form type: </p>
            <div id = "individualForms" [hidden]="!isIndividual" >
                <individual-form-selector></individual-form-selector>
            </div>
            <div id = "organizationForms" [hidden]="isIndividual" >
                <organization-form-selector></organization-form-selector>
            </div>
            
            <div><br></div>
        </mat-card-content> 
    </mat-card>
    <br>
</mat-dialog-content>
